<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Pi terminal showing the pr-status extension</title>
  <desc id="desc">A terminal window running Pi with a footer status item that reads PR #42 (Add README screenshot for pr-status).</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#101827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <style>
      .mono { font-family: "Cascadia Mono", "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .small { font-size: 20px; }
      .body { font-size: 23px; }
      .footer { font-size: 20px; }
      .dim { fill: #94a3b8; }
      .muted { fill: #64748b; }
      .text { fill: #e2e8f0; }
      .accent { fill: #a78bfa; }
      .green { fill: #86efac; }
      .cyan { fill: #67e8f9; }
      .yellow { fill: #fde68a; }
    </style>
  </defs>

  <rect width="1280" height="760" fill="url(#bg)"/>
  <rect x="34" y="34" width="1212" height="692" rx="22" fill="#0f172a" stroke="#334155" stroke-width="2" filter="url(#shadow)"/>

  <rect x="34" y="34" width="1212" height="58" rx="22" fill="#111827"/>
  <path d="M34 70 H1246 V92 H34 Z" fill="#111827"/>
  <circle cx="68" cy="63" r="9" fill="#f87171"/>
  <circle cx="98" cy="63" r="9" fill="#fbbf24"/>
  <circle cx="128" cy="63" r="9" fill="#34d399"/>
  <text x="168" y="70" class="mono small dim">pi -e ~/Projects/pi/jimkring-pi-extensions</text>

  <rect x="62" y="116" width="1156" height="544" rx="12" fill="#020617" stroke="#1e293b"/>

  <text x="88" y="156" class="mono body green">$</text>
  <text x="118" y="156" class="mono body text">pi -e ~/Projects/pi/jimkring-pi-extensions</text>

  <text x="88" y="205" class="mono body accent">Pi Coding Agent</text>
  <text x="88" y="241" class="mono body dim">Loaded extension package: @jimkring/pi-extensions</text>
  <text x="88" y="277" class="mono body dim">Session started in ~/Projects/pi/jimkring-pi-extensions</text>

  <text x="88" y="339" class="mono body cyan">╭──────────────────────────────────────────────────────────────╮</text>
  <text x="88" y="375" class="mono body cyan">│</text>
  <text x="126" y="375" class="mono body text">Ask for coding help, run tools, and keep context in sync.</text>
  <text x="822" y="375" class="mono body cyan">│</text>
  <text x="88" y="411" class="mono body cyan">╰──────────────────────────────────────────────────────────────╯</text>

  <text x="88" y="474" class="mono body yellow">User</text>
  <text x="153" y="474" class="mono body text">Update the README with a screenshot of pr-status.</text>
  <text x="88" y="526" class="mono body accent">Assistant</text>
  <text x="207" y="526" class="mono body text">I'll add an asset and embed it in README.md.</text>

  <rect x="62" y="674" width="1156" height="34" rx="7" fill="#111827" stroke="#1e293b"/>
  <text x="84" y="697" class="mono footer dim">cwd</text>
  <text x="130" y="697" class="mono footer text">jimkring-pi-extensions</text>
  <text x="386" y="697" class="mono footer muted">│</text>
  <text x="410" y="697" class="mono footer dim">model</text>
  <text x="484" y="697" class="mono footer text">gpt-5.1-codex-mini</text>
  <text x="744" y="697" class="mono footer muted">│</text>
  <text x="768" y="697" class="mono footer muted">PR</text>
  <text x="806" y="697" class="mono footer accent">#42</text>
  <text x="858" y="697" class="mono footer muted">(Add README screenshot for pr-status)</text>
</svg>
